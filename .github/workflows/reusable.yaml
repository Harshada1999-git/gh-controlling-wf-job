name: Reusable Workflow
on: 
    workflow_call:
        inputs:
            artifact-name:
                description: 'Name of the artifact to download'
                required: false
                type: string
                default: dist
        outputs:
            result:
                description: 'Result of the deployment'
                value: ${{ jobs.deploy.outputs.outcome }}
        secrets:
            some-secret:
                required: false
jobs:
    deploy:
        outputs:
            outcome: ${{steps.set-result.outputs.steps-result}}
        runs-on: ubuntu-latest
        steps:
            - name: get Code
              uses: actions/download-artifact@v3
              with:
                 name: ${{ inputs.artifact-name }}
            - name: List files
              run: ls
            - name: Output Info
              run: echo "Deploying & uploading....."
            - name: Set output
              id: set-result
              run: echo "::set-output name=steps-result::success "
